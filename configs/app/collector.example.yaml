schema_version: "1.0"
kind: app

app:
  name: collector
  version: "1.0"

collector:
  device_id: example-edge-001
  component: collector_web
  downstream:
    runtime_url: http://127.0.0.1:18080
    gateway_url: http://127.0.0.1:19090
    business_app_url: http://127.0.0.1:19110
  models:
    models_root: /opt/visionops_v3/models
  refresh:
    snapshot_refresh_interval_ms: 1000
    status_refresh_interval_ms: 2000
  preview:
    enabled: true
    max_fps: 5
    jpeg_quality: 85
  collection:
    data_root: /var/lib/visionops/collections
    max_batch_images: 1000
  diagnostics:
    enabled: true
    include_recent_logs: true
    include_raw_images: false
  runtime_control:
    allow_model_switch: true
    allow_service_restart: true
