schema_version: "1.0"
kind: app

app:
  name: carton_partition_check
  version: "1.0"

service:
  listen_host: 0.0.0.0
  listen_port: 19120
  upstream_url: http://127.0.0.1:8090
  upstream_kind: file
  poll_interval_ms: 500
  mock_case: defect

modbus:
  enabled: false
  listen_host: 0.0.0.0
  listen_port: 1520

rules:
  target_class_names: [cell, partition_cell, slot]
  defect_class_names: [missing_cell, broken_partition, foreign_body, defect]
  score_threshold: 0.50
  defect_score_threshold: 0.50
  expected_cell_count: 12
  min_cell_count: 12
  max_cell_count: 12
  roi_xyxy: [0, 0, 1280, 720]
  register_base: 200
