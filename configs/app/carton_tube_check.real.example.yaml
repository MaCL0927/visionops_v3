schema_version: "1.0"
kind: app
app:
  name: carton_tube_check
  version: "1.1"
  instance_id: tube-line-1
rules:
  # 真实 RKNN 纸筒模型当前输出 class_name=tube。
  target_class_names: [tube, carton_tube, paper_tube]
  target_class_ids: [0]
  accepted_task_types: [detection, detect]
  score_threshold: 0.50
  allow_multi_target: true
  min_target_count: 1
  max_target_count: 16
  roi_xyxy: [0, 0, 640, 480]
  # 现场需要中心位置约束时再打开 expected_center_xy / center_tolerance_px。
  expected_center_xy: null
  center_tolerance_px: null
  min_bbox_width: 5
  max_bbox_width: 640
  min_bbox_height: 5
  max_bbox_height: 480
  register_base: 100
