schema_version: "1.0"
kind: app

app:
  name: carton_tube_check
  version: "1.0"

service:
  listen_host: 0.0.0.0
  listen_port: 19110
  upstream_url: http://127.0.0.1:8090
  upstream_kind: file
  poll_interval_ms: 500
  mock_case: ok

modbus:
  enabled: false
  listen_host: 0.0.0.0
  listen_port: 1510

rules:
  target_class_names: [carton_tube, paper_tube, tube]
  score_threshold: 0.50
  allow_multi_target: false
  roi_xyxy: [0, 0, 1280, 720]
  expected_center_xy: [640, 360]
  center_tolerance_px: 250
  min_bbox_width: 80
  max_bbox_width: 300
  min_bbox_height: 80
  max_bbox_height: 300
  register_base: 100
