schema_version: "1.0"
kind: production_line
line_id: carton_palletizing
device_id: lb3576-carton-palletizing
component: carton_palletizing_app

camera_bridge:
  base_url: http://127.0.0.1:18182
  snapshot_path: /stream/snapshot.jpg
  depth_path: /stream/depth.png
  health_path: /health
  mjpeg_path: /stream.mjpeg
  deproject_path: /api/coordinate/deproject
  # 第2层及以上必须使用新鲜的 D2C 对齐深度图。
  max_depth_age_ms: 1500

runtime_recovery:
  stale_frame_timeout_ms: 3000
  failure_threshold: 3
  initial_backoff_ms: 200
  max_backoff_ms: 2000

runtime:
  url: http://127.0.0.1:28084
  model_dir: models/carton_palletizing/current
  roi_config_path: data/runtime/roi_carton_palletizing.json
  device_id: lb3576-carton-palletizing-runtime
  component: rknn_runtime_carton_palletizing
  accepted_task_types: [obb, obb_detection]

app:
  listen_host: 127.0.0.1
  listen_port: 19210
  request_timeout_ms: 5000

collector:
  listen_host: 0.0.0.0
  listen_port: 18094
  device_id: lb3576-carton-palletizing
  component: collector_carton_palletizing
  models_root: models/carton_palletizing
  snapshot_refresh_interval_ms: 200
  status_refresh_interval_ms: 2000
  # 工厂模式仍直接访问 Runtime；只有生产画面走业务应用，才能绘制摆放掩膜。
  production_inference_source: app

task:
  task_id: multi_layer_placement

  # 机器人通信：WebSocket 长连接 + trigger 被动触发；视频继续使用 336L MJPEG。
  communication:
    enabled: true
    trigger_mode: trigger

    trigger_tasks:
      # M29.2：保留原字符串任务名，同时兼容机器人侧数字任务号。
      # task_id 可发送 pallet_place_target、字符串 "1" 或数字 1；响应会原样回显。
      place_target: pallet_place_target
      place_target_aliases: [1, "1"]
      # task_id 可发送 held_box_pose、字符串 "2" 或数字 2；响应会原样回显。
      held_box: held_box_pose
      held_box_aliases: [2, "2"]

    remote_config:
      # ROI 只能在 VisionOps Web 端设置，并由 Runtime 的 roi_config_path 持久化。
      # 机器人 config 消息中的 detect_region 会被兼容接收但永久忽略，不能覆盖 Web ROI。
      roi_control_source: visionops_web_runtime
      # 保留协议中的动态置信度阈值能力；不需要时可改为 false。
      allow_confidence_threshold: true

    websocket:
      # 不同任务部署在不同视觉盒 IP 上，端口和路径固定。
      listen_host: 0.0.0.0
      listen_port: 9001
      path: /vision
      token: ""
      # trigger 模式通常只需要 detection/pong。关闭后不在连接建立时或后台周期推送 status；
      # 如机器人侧需要状态心跳，再改为 true。
      status_enabled: false
      status_on_connect: false
      status_interval_s: 1.0
      read_timeout_s: 30.0
      max_clients: 4
      max_payload_bytes: 1048576
      trigger_queue_size: 32

    video:
      # JSON 走 WebSocket；视频走独立 MJPEG，采用软同步。
      type: mjpeg
      public_url: http://192.168.20.201:18182/stream.mjpeg
      sync: soft

    trigger_sampling:
      # M29 的 pallet_place_target 已改为单帧观测，不再推进层/槽位状态机。
      # 以下字段仅为兼容旧配置保留，当前放置终点通信不再使用。
      max_place_samples: 1
      sample_interval_ms: 0.0

    point_sampling:
      # 摆放终点/手持箱中心都在 D2C 对齐深度图的小区域取中位数。
      roi_radius_px: 6
      percentile: 50.0
      min_valid_pixels: 3
      min_depth_mm: 100
      max_depth_mm: 5000

    surface_target_selection:
      # M29 放置终点任务只返回实际检测目标：
      #   - 没有纸箱时返回一个托盘；
      #   - 有纸箱时只返回深度最近的最上层纸箱，最多4个。
      max_items: 4
      # 相邻深度差大于该值时视为进入下一层；从最近目标到当前目标的总跨度
      # 还必须小于 max_top_layer_span_mm。现场可按箱高和相机倾角微调。
      layer_gap_mm: 80.0
      max_top_layer_span_mm: 140.0
      # 只返回托盘/垛型区域中的纸箱，避免把周边备用箱误认为垛顶。
      filter_to_tray_region: true
      tray_expand_ratio: 0.08
      min_tray_overlap_ratio: 0.05
      # 程序刚启动、托盘已被纸箱完全遮住时，允许在没有托盘参考的情况下使用纸箱。
      allow_boxes_without_tray_reference: true
      # 输出顺序固定为图像从上到下、同一行从左到右。
      sort_order: image_yx
      depth:
        roi_radius_px: 6
        percentile: 50.0
        min_valid_pixels: 3
        min_depth_mm: 100
        max_depth_mm: 5000

    held_box_selection:
      # 初期：nearest_depth，机器人手里的纸箱保证是画面中最高/离相机最近的箱子。
      # 后期：只把这里改成 outside_tray，代码无需修改。
      mode: nearest_depth

      # nearest_depth 可选歧义保护。初期工艺已保证最高，因此默认不强制。
      require_depth_advantage: false
      min_depth_advantage_mm: 20.0

      # outside_tray：纸箱中心必须在扩大的托盘区域外，且 OBB 与托盘重叠较小。
      tray_expand_ratio: 0.05
      max_tray_overlap_ratio: 0.20
      outside_tray_prefer_nearest_depth: true

      depth:
        roi_radius_px: 6
        percentile: 50.0
        min_valid_pixels: 3
        min_depth_mm: 100
        max_depth_mm: 5000

  algorithm:
    classes:
      # 当前 OBB 模型类别固定：0=纸箱，1=托盘。class_name 仅作为兼容兜底。
      tray_class_ids: [1]
      tray_class_names: [tray, pallet]
      box_class_ids: [0]
      box_class_names: [box, carton, carton_box]
      tray_min_confidence: 0.50
      box_min_confidence: 0.50

    geometry:
      # 第一阶段严格按 OBB 四点构建托盘坐标系和纸箱占位判断。
      require_obb: true
      # 托盘为上下长、左右窄的矩形：以短边构建居中的正方形垛型区域。
      # 这样左右占满，长边方向上下等距留白，避免四个纸箱被拉成长方形。
      footprint_mode: centered_square_by_short_edge
      footprint_fill_ratio: 1.0

    tray_tracking:
      # 托盘被纸箱遮挡后继续使用已锁定位置；更换托盘时调用 reset 或重启应用。
      lock_after_first_detection: true
      ema_alpha: 0.35
      update_min_iou: 0.30

    matching:
      min_iou: 0.12
      max_center_distance_ratio: 0.60
      max_orientation_diff_deg: 45.0
      center_inside_bonus: 0.45
      iou_weight: 0.35
      center_weight: 0.20
      orientation_weight: 0.10

    temporal:
      occupied_confirm_frames: 2
      empty_confirm_frames: 5
      # 已确认占位保持锁定，直到整垛 reset，防止短时漏检导致掩膜重新出现。
      sticky_occupied: true

    layering:
      # 默认堆4层；可改为任意正整数。设置为0时不限制层数。
      max_layers: 4
      auto_advance: true
      # 每层完成后采集多帧稳定深度，作为下一层基准。
      baseline_capture_frames: 3
      # 每层完成后先等待若干检测周期，让机器人和运动纸箱离开 ROI。
      baseline_settle_frames: 5
      baseline_stability_mm: 15.0
      # 每层都使用配置中的标准奇偶层模板。这样第2层不会直接复用第1层四个纸箱框，
      # 而是切换到错开的模板B；第3层回到模板A，以此类推。
      next_layer_geometry: layer_template
      # 仅当 next_layer_geometry 改回 previous_layer_detected_boxes 时生效。
      use_previous_detected_boxes: false

    depth:
      min_depth_mm: 100
      max_depth_mm: 5000
      # 向内缩小 slot，减少纸箱边缘、缝隙和飞点影响。
      slot_roi_shrink_ratio: 0.12
      min_valid_ratio: 0.45
      baseline_min_valid_ratio: 0.55
      # overhead 相机下，新纸箱更靠近相机：baseline - current > 0。
      # 80mm/600mm 为初始值，现场应按真实纸箱高度标定。
      min_height_delta_mm: 80.0
      max_height_delta_mm: 600.0
      min_coverage_ratio: 0.55
      height_percentile: 50.0
      # 多帧高度差不仅要连续满足阈值，帧间高度抖动也必须足够小。
      occupied_confirm_frames: 3
      occupied_stability_mm: 20.0

    template:
      # 奇数层使用模板A，偶数层使用模板B。两个模板使用相同 P1..P4 ID，
      # 但横竖方向与覆盖区域互换，形成上下层交错咬合。
      layer_strategy: odd_even
      default_template: odd
      # 从左下角 P3 开始，按画面中的顺时针方向：左下 -> 左上 -> 右上 -> 右下。
      slot_order: [P3, P1, P2, P4]
      # 坐标相对 geometry 生成的居中正方形垛型区域；0.65/0.35 为纸箱长短边比例。
      templates:
        odd:
          template_id: A
          name: odd_layer_interlock_A
          slots:
            - slot_id: P1
              name: top_left_horizontal
              orientation_deg: 0
              polygon_norm: [[0.00, 0.00], [0.65, 0.00], [0.65, 0.35], [0.00, 0.35]]
            - slot_id: P2
              name: top_right_vertical
              orientation_deg: 90
              polygon_norm: [[0.65, 0.00], [1.00, 0.00], [1.00, 0.65], [0.65, 0.65]]
            - slot_id: P3
              name: bottom_left_vertical
              orientation_deg: 90
              polygon_norm: [[0.00, 0.35], [0.35, 0.35], [0.35, 1.00], [0.00, 1.00]]
            - slot_id: P4
              name: bottom_right_horizontal
              orientation_deg: 0
              polygon_norm: [[0.35, 0.65], [1.00, 0.65], [1.00, 1.00], [0.35, 1.00]]

        even:
          template_id: B
          name: even_layer_interlock_B
          slots:
            - slot_id: P1
              name: top_left_vertical
              orientation_deg: 90
              polygon_norm: [[0.00, 0.00], [0.35, 0.00], [0.35, 0.65], [0.00, 0.65]]
            - slot_id: P2
              name: top_right_horizontal
              orientation_deg: 0
              polygon_norm: [[0.35, 0.00], [1.00, 0.00], [1.00, 0.35], [0.35, 0.35]]
            - slot_id: P3
              name: bottom_left_horizontal
              orientation_deg: 0
              polygon_norm: [[0.00, 0.65], [0.65, 0.65], [0.65, 1.00], [0.00, 1.00]]
            - slot_id: P4
              name: bottom_right_vertical
              orientation_deg: 90
              polygon_norm: [[0.65, 0.35], [1.00, 0.35], [1.00, 1.00], [0.65, 1.00]]

debug:
  allow_injected_runtime_result: false


# -----------------------------------------------------------------------------
# 纸箱外轮廓与抓取点任务（与多层托盘摆放相互独立）
# -----------------------------------------------------------------------------
box_grasp:
  device_id: lb3576-carton-box-grasp
  component: carton_box_grasp_app

  runtime:
    url: http://127.0.0.1:28085
    model_dir: models/carton_box_grasp/current
    roi_config_path: data/runtime/roi_carton_box_grasp.json
    device_id: lb3576-carton-box-grasp-runtime
    component: rknn_runtime_carton_box_grasp
    accepted_task_types: [segmentation, segment]

  app:
    listen_host: 127.0.0.1
    listen_port: 19211
    request_timeout_ms: 5000
    inference_settings_path: /opt/visionops_v3/config/box_grasp_inference_settings.json

  collector:
    listen_host: 0.0.0.0
    listen_port: 18095
    device_id: lb3576-carton-box-grasp
    component: collector_carton_box_grasp
    models_root: models/carton_box_grasp
    snapshot_refresh_interval_ms: 200
    status_refresh_interval_ms: 2000
    production_inference_source: app

  websocket:
    # 视觉盒作为 WebSocket Server，机器人后端作为 Client。
    listen_host: 0.0.0.0
    listen_port: 9001
    path: /vision
    token: ""
    auto_start: true
    # 每个完成的推理结果都会立即推送；没有独立 WebSocket Hz。
    # 生产推理目标由 /api/app/inference_settings 统一设置。
    status_interval_s: 2.0
    read_timeout_s: 30.0
    max_clients: 4
    max_payload_bytes: 1048576
    trigger_queue_size: 32

  video:
    # 与 JSON 软同步的 336L 原始 RGB MJPEG。部署时把主机地址改成视觉盒实际 LAN IP。
    type: mjpeg
    public_url: http://192.168.20.201:18182/stream.mjpeg
    sync: soft

  algorithm:
    image:
      width: 1280
      height: 720
      require_fixed_size: false
    classes:
      box_class_ids: [0]
      box_class_names: [box, carton, carton_box]
      box_min_confidence: 0.50
    selection:
      # 默认只向机器人返回置信度最高的一只箱子；可按现场需求增大。
      max_targets: 1
      output_order: confidence
    geometry:
      # 必须使用真实 proto mask，拒绝 Runtime 的 bbox_fallback 伪掩膜。
      require_proto_mask: true
      min_mask_area_px: 1500
      epsilon_min: 0.006
      epsilon_max: 0.12
      epsilon_steps: 28
      min_quad_area_ratio: 0.65
      max_quad_area_ratio: 1.35
      contour_max_points: 64
      # 抓取点向箱体中心内缩的比例
      grasp_inward_ratio: 0
    depth:
      enabled: true
      roi_radius_px: 6
      percentile: 50
      min_valid_pixels: 3
      min_depth_mm: 100
      max_depth_mm: 5000
      max_age_ms: 1500
      # 四个角点采样时向箱体中心内缩，避免读到背景。
      edge_inward_ratio: 0.08
      # 左右抓取点已经整体内移，再把深度采样位置额外向中心内缩 5%。
      # 反投影仍使用实际抓取点坐标，因此机器人收到的像素/相机坐标保持一致。
      grasp_extra_inward_ratio: 0.1

  debug:
    save_every_trigger: false
    save_root: /tmp/visionops_v3/carton_palletizing/box_grasp_vision/latest
